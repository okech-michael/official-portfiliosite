<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Michael Onyango — Software Engineer{% endblock %}</title>
  <meta name="description" content="Michael Onyango — Software Engineer building scalable digital solutions."/>
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- NAV -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="{% url 'home' %}" class="nav-logo">
        <span class="logo-bracket">&lt;</span>MO<span class="logo-bracket">/&gt;</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="{% url 'home' %}" class="nav-link {% block nav_home %}{% endblock %}">Home</a></li>
        <li><a href="{% url 'skills' %}" class="nav-link {% block nav_skills %}{% endblock %}">Skills</a></li>
        <li><a href="{% url 'education' %}" class="nav-link {% block nav_education %}{% endblock %}">Education</a></li>
        <li><a href="{% url 'projects' %}" class="nav-link {% block nav_projects %}{% endblock %}">Projects</a></li>
        <li><a href="{% url 'contact' %}" class="nav-link nav-cta {% block nav_contact %}{% endblock %}">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-name">Michael Onyango</p>
      <p class="footer-copy">© 2025 · Terrasept Solutions Limited · All rights reserved</p>
      <div class="footer-links">
        <a href="https://github.com/okech-michael" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/michael-onyango-179291372/?lipi=urn%3Ali%3Apage%3Ad_flagship3_profile_view_base_contact_details%3Bru5S8zKoRlaWgWApBikV4A%3D%3D" target="_blank" rel="noopener">LinkedIn</a>
        <a href="mailto:okechmichael2004@gmail.com">Email</a>
      </div>
    </div>
  </footer>

  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
